name: Build Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf

      - name: Build HTML
        run: |
          pandoc resume.md \
            --standalone \
            --css=style.css \
            --metadata title="钱弋海 - Resume" \
            --from markdown+smart \
            --to html5 \
            -o index.html

      - name: Build PDF
        run: |
          pandoc resume.md \
            --pdf-engine=wkhtmltopdf \
            --css=style.css \
            --metadata title="钱弋海 - Resume" \
            --from markdown+smart \
            -o resume.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          destination_dir: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Resume PDF"
          files: resume.pdf
          body: |
            📄 自动生成的简历 PDF

            由 GitHub Actions 自动构建，每次 push 到 main 分支时更新。
          prerelease: false
          make_latest: true
        continue-on-error: true
