name: Build Resume

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # fonts-noto-cjk: 中文字体（关键！否则 PDF 中所有中文会丢失/变成空白方块）
          # fonts-noto-color-emoji: 兼容简历中的 📧 🌐 等 emoji 图标
          # WeasyPrint 运行所需系统库（pango/cairo/gdk-pixbuf）
          sudo apt-get install -y pandoc fonts-noto-cjk fonts-noto-color-emoji \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2
          # 用 WeasyPrint 替代已停止维护的 wkhtmltopdf，分页更干净、不会出现大片留白
          pip install --upgrade weasyprint
          # 刷新字体缓存，确保排版引擎能检索到新安装的字体
          sudo fc-cache -f -v

      - name: Build HTML
        run: |
          pandoc resume.md \
            --standalone \
            --css=style.css \
            --metadata title="钱进 - Resume" \
            --from markdown+smart \
            --to html5 \
            -o index.html

      - name: Build PDF
        run: |
          pandoc resume.md \
            --pdf-engine=weasyprint \
            --css=style.css \
            --metadata title="钱进 - Resume" \
            --from markdown+smart \
            -o resume.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          destination_dir: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Resume PDF"
          files: resume.pdf
          body: |
            📄 自动生成的简历 PDF

            由 GitHub Actions 自动构建，每次 push 到 main 分支时更新。
          prerelease: false
          make_latest: true
        continue-on-error: true
